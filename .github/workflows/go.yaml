name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['stable', 'oldstable']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Show versions
        run: |
          go version
          go env GOPATH GOMODCACHE GOCACHE

      - name: Vet
        run: go vet ./...

      - name: Test (unit)
        run: go test -v ./...

      - name: Test (integration)
        run: go test -v -tags=integration ./...

      - name: Build
        run: go build -v ./...
